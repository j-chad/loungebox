#cloud-config
autoinstall:
  version: 1
  interactive-sections:
    - network
  identity:
    hostname: loungebox
    username: lounge
    # Locked password — SSH key auth only.
    # The '!' prefix locks the account password; login is via SSH key below.
    password: "!"
  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - ssh-ed25519 PLACEHOLDER_REPLACE_WITH_YOUR_PUBLIC_KEY
  keyboard:
    layout: au
  locale: en_NZ.UTF-8
  timezone: Pacific/Auckland
  drivers:
    install: true
  storage:
    layout:
      name: direct
      match:
        type: nvme
      config:
        - type: disk
          id: nvme0n1
          wipe: superblock-recursive
          preserve: false
          partitions:
            - type: partition
              size: 30G
              fs-type: ext4
              mount-point: /
  packages:
    - git
    - nano
    - curl
    - sqlite3
  updates: all
  late-commands:
    - curtin in-target --target=/target -- systemctl enable ssh
    - curtin in-target --target=/target -- systemctl start ssh

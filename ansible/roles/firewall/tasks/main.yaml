- name: Install UFW
  apt:
    name: ufw
    state: present

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH on local network
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    from_ip: 192.168.0.0/16

- name: Allow SSH on Tailscale interface
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    interface: tailscale0
    direction: in

- name: Allow HTTP on Tailscale interface
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    interface: tailscale0
    direction: in

- name: Allow HTTPS on Tailscale interface
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    interface: tailscale0
    direction: in

- name: Enable UFW
  community.general.ufw:
    state: enabled

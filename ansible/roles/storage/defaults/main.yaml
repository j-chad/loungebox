# 4x WD Reds in RAIDZ1
# Override array_devices with /dev/disk/by-id/ paths from your hardware.
array_pool_name: storage
array_devices: []
array_mountpoint: /mnt/storage

zfs_datasets:
  - name: storage/eros
    mountpoint: /mnt/storage/eros
  - name: storage/backups
    mountpoint: /mnt/storage/backups
